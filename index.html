<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toán Thầy Trung - Tra cứu kết quả</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: #0a192f; color: #ccd6f6; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 900px; width: 100%; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); padding: 40px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        
        h1 { color: #fff; margin-bottom: 10px; font-size: 2.2em; }
        .sub-title { opacity: 0.7; margin-bottom: 30px; font-style: italic; }

        /* Khu vực tra cứu */
        .search-box { background: #112240; padding: 30px; border-radius: 12px; border: 1px solid #64ffda33; margin-bottom: 30px; }
        .search-box h3 { color: #64ffda; margin-bottom: 15px; }
        input { width: 100%; max-width: 300px; padding: 12px; border-radius: 6px; border: 1px solid #233554; background: #0a192f; color: #fff; text-align: center; font-size: 1.1em; outline: none; margin-bottom: 15px; }
        input:focus { border-color: #64ffda; }
        button { background: #64ffda; color: #0a192f; padding: 12px 30px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; transform: translateY(-2px); }

        /* Kết quả tra cứu */
        #result { margin-top: 20px; padding: 20px; border-radius: 10px; display: none; text-align: left; background: rgba(100, 255, 218, 0.1); border: 1px dashed #64ffda; }
        .res-item { margin-bottom: 10px; font-size: 1.1em; }
        .res-label { font-weight: 700; color: #64ffda; }

        .khối-classes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px; }
        .card-khối { background: #112240; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 25px; text-decoration: none; color: #ccd6f6; transition: 0.3s; }
        .card-khối:hover { transform: translateY(-8px); border-color: #64ffda; }
        .card-khối i { font-size: 2.5em; margin-bottom: 15px; display: block; color: #fff; }

        @media (max-width: 600px) { .khối-classes-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Toán Thầy Trung</h1>
        <p class="sub-title">Trường THPT Số 1 Tư Nghĩa</p>

        <div class="search-box">
            <h3><i class="fas fa-user-check"></i> Tra cứu kết quả cá nhân</h3>
            <input type="text" id="studentID" placeholder="Nhập mã số của em...">
            <br>
            <button onclick="traCuu()">Xem kết quả</button>

            <div id="loading" style="display: none; margin-top: 15px;">Đang tìm kiếm...</div>
            
            <div id="result">
                <div class="res-item"><span class="res-label">Họ tên:</span> <span id="res-ten"></span></div>
                <div class="res-item"><span class="res-label">Điểm số:</span> <span id="res-diem"></span></div>
                <div class="res-item"><span class="res-label">Thầy nhắn:</span> <span id="res-nhanxet"></span></div>
                <div id="res-link-area" style="margin-top: 10px;">
                    <a id="res-link" href="#" target="_blank" style="color: #64ffda; text-decoration: underline;">Tải tài liệu riêng của em</a>
                </div>
            </div>
        </div>

        <div class="khối-classes-grid">
            <a href="lop10.html" class="card-khối"><i class="fas fa-calculator"></i><h2>Khối 10</h2></a>
            <a href="lop11.html" class="card-khối"><i class="fas fa-function"></i><h2>Khối 11</h2></a>
            <a href="lop12.html" class="card-khối"><i class="fas fa-compass-drafting"></i><h2>Khối 12</h2></a>
        </div>
    </div>

    <script>
        function traCuu() {
            const maso = document.getElementById('studentID').value;
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const scriptURL = "https://script.google.com/macros/s/AKfycby5vlE0CesQlnjcs6Joo0i_G4oFF3xuIlFhTTPXN9pyjH-emLbLmHusf3ebsZFy3uA7/exec";

            if (!maso) { alert("Em vui lòng nhập mã số!"); return; }

            loading.style.display = 'block';
            resultDiv.style.display = 'none';

            fetch(`${scriptURL}?maso=${maso}`)
                .then(response => response.json())
                .then(data => {
                    loading.style.display = 'none';
                    if (data.status === "success") {
                        document.getElementById('res-ten').innerText = data.ten;
                        document.getElementById('res-diem').innerText = data.diem || "Chưa có điểm";
                        document.getElementById('res-nhanxet').innerText = data.nhanXet || "Cố gắng em nhé!";
                        
                        if (data.link) {
                            document.getElementById('res-link-area').style.display = 'block';
                            document.getElementById('res-link').href = data.link;
                        } else {
                            document.getElementById('res-link-area').style.display = 'none';
                        }
                        
                        resultDiv.style.display = 'block';
                    } else {
                        alert("Không tìm thấy mã số này. Em kiểm tra lại nhé!");
                    }
                })
                .catch(error => {
                    loading.style.display = 'none';
                    alert("Có lỗi xảy ra, thầy sẽ kiểm tra lại hệ thống!");
                    console.error('Error:', error);
                });
        }
    </script>
</body>
</html>
