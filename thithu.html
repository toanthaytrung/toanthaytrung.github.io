<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thi Thử Toán 12 - Thầy Trung</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { background-color: #0a192f; color: #ccd6f6; font-family: 'Poppins', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .quiz-container { max-width: 800px; width: 100%; background: #112240; padding: 30px; border-radius: 15px; border: 1px solid #64ffda33; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #64ffda; text-align: center; margin-bottom: 20px; }
        .question { margin-bottom: 30px; padding: 20px; border-bottom: 1px solid #233554; }
        .question-text { font-size: 1.1em; margin-bottom: 15px; color: #fff; line-height: 1.6; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option { background: #0a192f; border: 1px solid #233554; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; color: #ccd6f6; text-align: left; }
        .option:hover { border-color: #64ffda; background: #1d3557; }
        .option.selected { background: #64ffda; color: #0a192f; font-weight: 700; border-color: #fff; }
        #submit-btn { width: 100%; padding: 15px; background: #64ffda; color: #0a192f; border: none; border-radius: 8px; font-weight: 700; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
        #result { display: none; margin-top: 30px; padding: 20px; background: rgba(100, 255, 218, 0.1); border-radius: 10px; border: 1px dashed #64ffda; text-align: center; }
        .explanation { margin-top: 10px; font-size: 0.9em; color: #8892b0; display: none; padding: 10px; background: #0a192f; border-radius: 5px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Thi Thử Toán 12 - Số 01</h1>
    <div id="quiz">
        </div>
    <button id="submit-btn" onclick="checkAnswers()">Nộp bài và xem lời giải</button>
    
    <div id="result">
        <h2 id="score-text"></h2>
        <p>Chúc mừng em đã hoàn thành bài thi!</p>
        <button onclick="location.href='lop12.html'" style="margin-top:10px; padding: 5px 15px; cursor:pointer;">Quay lại</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "Câu 1: Cho hàm số \( y = x^3 - 3x + 2 \). Điểm cực tiểu của đồ thị hàm số là:",
            options: ["A. (1; 0)", "B. (-1; 4)", "C. (0; 2)", "D. (1; 4)"],
            a: 0,
            exp: "Giải: \( y' = 3x^2 - 3 \). \( y' = 0 \Leftrightarrow x = \pm 1 \). Lập bảng biến thiên ta thấy cực tiểu tại \( x = 1, y = 0 \)."
        },
        {
            q: "Câu 2: Thể tích khối chóp có diện tích đáy \( B \) và chiều cao \( h \) là:",
            options: ["A. \( V = Bh \)", "B. \( V = \frac{1}{3}Bh \)", "C. \( V = \frac{1}{2}Bh \)", "D. \( V = 3Bh \)"],
            a: 1,
            exp: "Giải: Theo công thức tính thể tích khối chóp: \( V = \frac{1}{3}B.h \)."
        },
        {
            q: "Câu 3: Nghiệm của phương trình \( \log_2(x-1) = 3 \) là:",
            options: ["A. \( x = 7 \)", "B. \( x = 10 \)", "C. \( x = 9 \)", "D. \( x = 8 \)"],
            a: 2,
            exp: "Giải: \( x - 1 = 2^3 = 8 \Leftrightarrow x = 9 \)."
        }
    ];

    function loadQuiz() {
        const quizDiv = document.getElementById('quiz');
        quizDiv.innerHTML = quizData.map((item, index) => `
            <div class="question" id="q${index}">
                <div class="question-text">${item.q}</div>
                <div class="options">
                    ${item.options.map((opt, i) => `
                        <button class="option" onclick="selectOption(${index}, ${i}, this)">${opt}</button>
                    `).join('')}
                </div>
                <div class="explanation" id="exp${index}">${item.exp}</div>
            </div>
        `).join('');
    }

    let userAnswers = {};
    function selectOption(qIdx, oIdx, btn) {
        userAnswers[qIdx] = oIdx;
        const parent = btn.parentElement;
        Array.from(parent.children).forEach(child => child.classList.remove('selected'));
        btn.classList.add('selected');
    }

    function checkAnswers() {
        let score = 0;
        quizData.forEach((item, index) => {
            const exp = document.getElementById(`exp${index}`);
            exp.style.display = 'block';
            if (userAnswers[index] === item.a) {
                score++;
                document.getElementById(`q${index}`).style.borderColor = '#4ade80';
            } else {
                document.getElementById(`q${index}`).style.borderColor = '#f87171';
            }
        });
        document.getElementById('result').style.display = 'block';
        document.getElementById('score-text').innerText = `Kết quả: ${score}/${quizData.length}`;
        document.getElementById('submit-btn').style.display = 'none';
        window.scrollTo(0, document.body.scrollHeight);
    }

    loadQuiz();
</script>
</body>
</html>
