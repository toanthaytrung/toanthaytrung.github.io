<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thi Thử Toán 12 - Thầy Trung</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { background-color: #0a192f; color: #ccd6f6; font-family: 'Poppins', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .quiz-container { max-width: 850px; width: 100%; background: #112240; padding: 30px; border-radius: 15px; border: 1px solid #64ffda33; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #64ffda; text-align: center; margin-bottom: 20px; }
        .question { margin-bottom: 30px; padding: 20px; border: 1px solid #233554; border-radius: 10px; transition: 0.3s; }
        .question-text { font-size: 1.15em; margin-bottom: 20px; color: #fff; line-height: 1.6; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option { background: #0a192f; border: 1px solid #233554; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; color: #ccd6f6; text-align: left; font-size: 1em; }
        .option:hover { border-color: #64ffda; background: #1d3557; }
        .option.selected { background: #64ffda; color: #0a192f; font-weight: 700; border-color: #fff; }
        #submit-btn { width: 100%; padding: 18px; background: #64ffda; color: #0a192f; border: none; border-radius: 8px; font-weight: 700; font-size: 1.2em; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        #submit-btn:hover { background: #fff; transform: scale(1.02); }
        #result { display: none; margin-top: 30px; padding: 30px; background: rgba(100, 255, 218, 0.1); border-radius: 12px; border: 2px dashed #64ffda; text-align: center; }
        .explanation { margin-top: 15px; font-size: 0.95em; color: #a8b2d1; display: none; padding: 15px; background: #0a192f; border-radius: 8px; border-left: 4px solid #64ffda; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1><i class="fas fa-edit"></i> Thi Thử Toán 12 - Đề số 01</h1>
    <div id="quiz"></div>
    <button id="submit-btn" onclick="checkAnswers()">Nộp bài và xem lời giải chi tiết</button>
    
    <div id="result">
        <h2 id="score-text" style="font-size: 2em; color: #64ffda;"></h2>
        <p style="margin: 15px 0;">Thầy chúc mừng em đã hoàn thành bài tập!</p>
        <button onclick="location.href='lop12.html'" style="padding: 10px 20px; cursor:pointer; background:#233554; color:white; border:none; border-radius:5px;">Quay lại tài liệu</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "Câu 1: Cho hàm số $y = x^3 - 3x + 2$. Điểm cực tiểu của đồ thị hàm số là:",
            options: ["A. $(1; 0)$ ", "B. $(-1; 4)$ ", "C. $(0; 2)$ ", "D. $(1; 4)$ "],
            a: 0,
            exp: "Giải: Ta có $y' = 3x^2 - 3$. Cho $y' = 0 \\Leftrightarrow x = \\pm 1$. Qua $x = 1$, $y'$ đổi dấu từ âm sang dương nên cực tiểu tại $(1; 0)$."
        },
        {
            q: "Câu 2: Thể tích khối chóp có diện tích đáy $B$ và chiều cao $h$ được tính theo công thức:",
            options: ["A. $V = Bh$", "B. $V = \\frac{1}{3}Bh$", "C. $V = \\frac{1}{2}Bh$", "D. $V = 3Bh$"],
            a: 1,
            exp: "Giải: Thể tích khối chóp bằng một phần ba tích diện tích đáy và chiều cao: $V = \\frac{1}{3}Bh$."
        },
        {
            q: "Câu 3: Nghiệm của phương trình $\\log_2(x-1) = 3$ là:",
            options: ["A. $x = 7$", "B. $x = 10$", "C. $x = 9$", "D. $x = 8$"],
            a: 2,
            exp: "Giải: Phương trình tương đương $x - 1 = 2^3 \\Leftrightarrow x - 1 = 8 \\Leftrightarrow x = 9$."
        }
    ];

    function loadQuiz() {
        const quizDiv = document.getElementById('quiz');
        quizDiv.innerHTML = quizData.map((item, index) => `
            <div class="question" id="q${index}">
                <div class="question-text">${item.q}</div>
                <div class="options">
                    ${item.options.map((opt, i) => `
                        <button class="option" onclick="selectOption(${index}, ${i}, this)">${opt}</button>
                    `).join('')}
                </div>
                <div class="explanation" id="exp${index}">${item.exp}</div>
            </div>
        `).join('');
        // Yêu cầu MathJax vẽ lại công thức sau khi nạp nội dung
        if (window.MathJax) { MathJax.typeset(); }
    }

    let userAnswers = {};
    function selectOption(qIdx, oIdx, btn) {
        userAnswers[qIdx] = oIdx;
        const parent = btn.parentElement;
        Array.from(parent.children).forEach(child => child.classList.remove('selected'));
        btn.classList.add('selected');
    }

    function checkAnswers() {
        if (Object.keys(userAnswers).length < quizData.length) {
            alert("Em hãy hoàn thành tất cả các câu hỏi nhé!");
            return;
        }
        let score = 0;
        quizData.forEach((item, index) => {
            const exp = document.getElementById(`exp${index}`);
            exp.style.display = 'block';
            if (userAnswers[index] === item.a) {
                score++;
                document.getElementById(`q${index}`).style.borderColor = '#4ade80';
            } else {
                document.getElementById(`q${index}`).style.borderColor = '#f87171';
            }
        });
        document.getElementById('result').style.display = 'block';
        document.getElementById('score-text').innerText = `Kết quả: ${score}/${quizData.length}`;
        document.getElementById('submit-btn').style.display = 'none';
        if (window.MathJax) { MathJax.typeset(); }
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    loadQuiz();
</script>
</body>
</html>
