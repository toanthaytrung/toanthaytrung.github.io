<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toán 12 - Thầy Trung</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;450;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a192f; --card: #112240; --accent: #64ffda; --text: #ccd6f6; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; }
        h1 { color: var(--accent); text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Khu vực tra cứu */
        .search-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #233554; margin-bottom: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .search-box input { width: 80%; padding: 12px; border-radius: 8px; border: 1px solid #233554; background: #0a192f; color: white; font-size: 1.1em; text-align: center; margin-bottom: 15px; outline: none; }
        .search-box button { background: var(--accent); color: #0a192f; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .search-box button:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Bảng kết quả tra cứu */
        #result-area { margin-top: 20px; display: none; }
        .result-table { width: 100%; border-collapse: collapse; background: #0a192f; border-radius: 10px; overflow: hidden; }
        .result-table th { background: #233554; color: var(--accent); padding: 12px; text-align: left; }
        .result-table td { padding: 12px; border-bottom: 1px solid #233554; color: var(--white); }

        /* Danh sách bài học */
        .topic-list { display: grid; gap: 20px; }
        .topic-item { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #233554; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .topic-item:hover { border-color: var(--accent); transform: translateX(5px); }
        .topic-info h3 { margin: 0; color: var(--white); font-size: 1.1em; }
        .topic-info p { margin: 5px 0 0; font-size: 0.85em; color: #8892b0; }
        .btn-link { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 0.9em; transition: 0.3s; }
        .btn-link:hover { background: var(--accent); color: #0a192f; }
        
        .footer { margin-top: 50px; text-align: center; font-size: 0.8em; color: #495670; }
    </style>
</head>
<body>

<div class="container">
    <h1>Toán 12 - Thầy Trung</h1>

    <div class="search-box">
        <p style="margin-top:0">Tra cứu kết quả học tập</p>
        <input type="text" id="studentCode" placeholder="Nhập mã số học sinh (VD: 1201)">
        <br>
        <button onclick="traCuuDiem()">XEM KẾT QUẢ</button>
        
        <div id="result-area">
            </div>
    </div>

    <div class="topic-list">
        <div class="topic-item">
            <div class="topic-info">
                <h3>Chuyên đề: Ứng dụng Tích phân</h3>
                <p>Diện tích hình phẳng & Thể tích vật thể tròn xoay</p>
            </div>
            <a href="https://drive.google.com/file/d/1q98V2RXYcZUXiBzFnAStCsPxBNeD8RQ3/view?usp=sharing" target="_blank" class="btn-link">Xem bài giảng</a>
        </div>

        <div class="topic-item" style="border-color: var(--accent); background: #1d2d50;">
            <div class="topic-info">
                <h3 style="color: var(--accent);">Thi Thử Trắc Nghiệm 2026</h3>
                <p>Cấu trúc chuẩn Bộ GD&ĐT (90 phút)</p>
            </div>
            <a href="thithu.html" class="btn-link" style="background: var(--accent); color: #0a192f; font-weight: bold;">VÀO THI</a>
        </div>
        
        </div>

    <div class="footer">
        &copy; 2025 Hệ thống học tập trực tuyến - Thầy Trung Toán
    </div>
</div>

<script>
    // --- CẤU HÌNH TRA CỨU ---
    // QUAN TRỌNG: Thầy dán link Web App mới từ Apps Script vào đây
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwplOFFoRH57Xtk5w4m7pHs5NyXHwWbhtbvn5dJBOAJ73LFIe3ZeKD9OXObr-4k9qN8/exec";

    async function traCuuDiem() {
        const maso = document.getElementById('studentCode').value.trim();
        const resultArea = document.getElementById('result-area');
        
        if (!maso) {
            alert("Em vui lòng nhập mã số học sinh!");
            return;
        }

        resultArea.style.display = 'block';
        resultArea.innerHTML = "<p style='color: var(--accent)'>Đang tải dữ liệu từ Sheets...</p>";

        try {
            // Gọi lên Google Sheets để lấy lịch sử thi
            const response = await fetch(`${SCRIPT_URL}?maso=${maso}`);
            const history = await response.json();

            if (history.length === 0) {
                resultArea.innerHTML = `<p style="color: #ef4444">Không tìm thấy lịch sử thi cho mã số ${maso}. Em hãy kiểm tra lại mã hoặc tham gia thi thử nhé!</p>`;
                return;
            }

            // Tạo bảng hiển thị kết quả
            let tableHtml = `
                <p style="text-align: left; color: var(--accent); margin-top: 20px;">Lịch sử thi của em:</p>
                <table class="result-table">
                    <thead>
                        <tr>
                            <th>Ngày làm bài</th>
                            <th>Điểm số</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            history.forEach(item => {
                tableHtml += `
                    <tr>
                        <td>${item.thoigian}</td>
                        <td style="font-weight: bold; color: var(--accent)">${item.diem}</td>
                    </tr>
                `;
            });

            tableHtml += `</tbody></table>`;
            resultArea.innerHTML = tableHtml;

        } catch (error) {
            console.error(error);
            resultArea.innerHTML = `<p style="color: #ef4444">Lỗi kết nối máy chủ! Thầy chưa dán đúng Link Script hoặc chưa Deploy chế độ 'Anyone'.</p>`;
        }
    }
</script>

</body>
</html>
